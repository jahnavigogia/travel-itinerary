{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AppVersal - Download Apps and Earn Money</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}" />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
  </head>
  <body class="main-bg">
    <div class="login-container text-c animated flipInX">
      <div>
        <h1 class="logo-badge text-whitesmoke">
          <span class="fa fa-user-circle"></span>
        </h1>
      </div>
      <h3 class="text-whitesmoke">Sign In</h3>
      <div class="container-content">
        {% if messages %} {% for message in messages %}
        <div style="color: red">{{ message }}</div>
        {% endfor %} {% endif %}
        <form action="" method="post" class="margin-t" id="loginForm">
          {% csrf_token %}
          <div class="form-group">
            <input
              id="email"
              type="email"
              name="email"
              class="form-control"
              placeholder="Email"
            />
          </div>
          <div class="form-group">
            <input
              id="password"
              type="password"
              name="password"
              class="form-control"
              placeholder="*****"
            />
          </div>
          <button
            type="button"
            onclick="handleLogin()"
            class="form-button button-l margin-b"
          >
            Sign In
          </button>

          <a class="text-darkbrown" href="/forgot-password/"><small>Forgot your password?</small></a>
          <p class="text-whitesmoke text-center">
            <small>Do not have an account?</small>
          </p>
          <a class="signUp" href="/register"><small>Sign Up</small></a>
        </form>
        <br />
        <a class="return" href="/">Go Back</a>
        <p class="margin-t text-whitesmoke">
          <small>&copy;All Rights Reserved </small>
        </p>
      </div>
    </div>

    <script>
      function getCsrfToken() {
        return document.querySelector("input[name=csrfmiddlewaretoken]").value;
      }

      function handleLogin() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const csrfToken = getCsrfToken();

        const formData = new FormData();
        formData.append("email", email);
        formData.append("password", password);

        fetch("/login/", {
          method: "POST",
          body: formData,
          headers: {
            "X-CSRFToken": csrfToken,
          },
          credentials: "include", // Important for sessionid cookie
        })
          .then((response) => {
            if (response.status === 200) {
              // ✅ Login successful – redirect with full reload
              window.location.href = "/index/";
            } else if (response.status === 400) {
              alert("Invalid credentials.");
            } else if (response.status === 403) {
              alert("Session expired. Please reload the page.");
              window.location.reload();
            } else {
              alert("Something went wrong.");
            }
          })
          .catch((error) => {
            console.error("Error:", error);
            alert("Network error occurred.");
          });
      }
    </script>
  </body>
</html>
